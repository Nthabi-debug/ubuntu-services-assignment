<!DOCTYPE html>
<html>
    <head>
        <title>Ubuntu Services - Report an Issue</title>
        <style>
            *{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Segoe UI', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 600px;
                margin: 0 auto;
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                overflow: hidden;
            }

            .header {
                background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
                color: white;
                padding: 30px;
                text-align: center;
            }

            .header h1 {
                font-size: 28px;
                margin-bottom: 5px;
            }

            .header p {
                opacity: 0.9;
                font-size: 14px;
            }

            .nav {
                background: #f8f9fa;
                padding: 15px;
                text-align: center;
                border-bottom: 1px solid #e0e0e0;
            }

            .nav a {
                margin: 0 15px;
                text-decoration: none;
                color: #3498db;
                font-weight: 500;
                transition: color 0.3s;
            }

            .nav a:hover {
                color: #2c3e50;
            }

            .content {
                padding: 30px;
            }

            .content h2 {
                color: #2c3e50;
                margin-bottom: 20px;
                font-size: 24px;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .form-group {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            label {
                font-weight: 600;
                color: #2c3e50;
            }

            input, select, textarea {
                padding: 12px;
                border: 2px solid #e0e0e0;
                border-radius: 10px;
                font-size: 16px;
                transition: border-color 0.3s;
            }

            input:focus, select:focus, textarea:focus {
                outline: none;
                border-color: #3498db;
            }

            button {
                background: linear-gradient(135deg, #3498db 0%, #2c3e50 100%);
                color: white;
                padding: 14px;
                border: none;
                border-radius: 10px;
                font-size: 18px;
                font-weight: 600;
                cursor: pointer;
                transition: transform 0.2s;
            }

            button:hover {
                transform: translateY(-2px);
            }

            .footer {
                background: #f8f9fa;
                padding: 15px;
                text-align: center;
                color: #7f8c8d;
                font-size: 12px;
            }

            </style>
            </head>
            <body>
                <div class="container">
                    <div class="header">
                        <h1>Ubuntu Services</h1>
                        <p>Communiry First. Together.</p>
                        </div>

                        <div class="nav">
                            <a href="/">Home</a>
                            <a href="/report/">Report</a>
                            <a href="/track/">Track</a>
                            </div>

                            <div class="content">
                                <h2>Report an Issue</h2>
                                <form method="post" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    {{ form.as_p }}
                                    <button type="submit">Submit Report</button>
                                    </form>
                                    </div>

                                    <div class="footer">
                                        <p>Ubuntu Services - Building better communities together</p>
                                        </div>
                                        </div>
                                        </body>
                                        </html>
